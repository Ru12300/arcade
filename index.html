<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕹 Arcade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a1a}
#arc{background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;min-height:100vh}

/* ── LOGIN ── */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;position:relative}
#login h1{font-size:32px;font-weight:700;letter-spacing:6px;color:#ffe600;margin-bottom:6px;text-shadow:0 0 20px #ffe60066}
#login .tagline{font-size:10px;color:#444;letter-spacing:3px;margin-bottom:44px}
.login-box{background:#12122a;border:2px solid #2a2a4a;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;align-items:center}
.login-box h2{font-size:14px;letter-spacing:2px;color:#ffe600;margin-bottom:4px}
.login-box p{font-size:10px;color:#555;letter-spacing:1px;text-align:center;line-height:1.7}
.choice-btns{display:flex;gap:12px;width:100%}
.choice-btn{flex:1;padding:14px 8px;border-radius:10px;border:2px solid;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:2px;transition:all .15s}
.choice-btn.new-btn{background:#0d2a0d;border-color:#44ff88;color:#44ff88}
.choice-btn.new-btn:hover{background:#1a3d1a;transform:translateY(-2px)}
.choice-btn.start-btn{background:#0d1a2a;border-color:#4fc3f7;color:#4fc3f7}
.choice-btn.start-btn:hover{background:#1a2a3d;transform:translateY(-2px)}
.pw-form{display:flex;flex-direction:column;gap:12px;width:100%;align-items:center}
.pw-input{background:#0a0a1a;border:2px solid #2a2a4a;color:#ffe600;padding:12px 16px;border-radius:8px;font-size:14px;font-family:'Courier New',monospace;width:100%;outline:none;letter-spacing:2px;text-align:center;transition:border-color .15s}
.pw-input:focus{border-color:#ffe600}
.pw-input::placeholder{color:#333;letter-spacing:1px;font-size:11px}
.submit-btn{background:#ffe600;color:#0a0a1a;border:none;padding:12px 32px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;width:100%;transition:background .15s}
.submit-btn:hover{background:#ffd000}
.back-link{font-size:10px;color:#444;cursor:pointer;letter-spacing:1px;text-decoration:underline}
.back-link:hover{color:#888}
.err-msg{font-size:11px;color:#ff4444;letter-spacing:1px;text-align:center;min-height:16px}
.ok-msg{font-size:11px;color:#44ff88;letter-spacing:1px;text-align:center}

/* ── HOME ── */
#home{display:none;flex-direction:column;align-items:center;padding:28px 14px;position:relative;min-height:100vh}
#home h1{font-size:26px;font-weight:700;letter-spacing:5px;color:#ffe600;margin-bottom:3px}
#home .sub{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:18px}
.welcome{font-size:11px;color:#44ff88;letter-spacing:1px;margin-bottom:20px}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:480px}
.gc{background:#12122a;border:2px solid #2a2a4a;border-radius:14px;padding:22px 12px;text-align:center;cursor:pointer;transition:border-color .15s,transform .12s;user-select:none}
.gc:hover{transform:translateY(-3px)}
.gc .ic{font-size:36px;margin-bottom:8px;display:block;pointer-events:none}
.gc .nm{font-size:12px;font-weight:700;letter-spacing:1px;color:#ddd;pointer-events:none}
.gc .ds{font-size:9px;color:#444;margin-top:3px;pointer-events:none}
.logout-btn{margin-top:20px;background:none;border:1px solid #333;color:#555;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .15s}
.logout-btn:hover{border-color:#ff4444;color:#ff4444}

/* ── GAME WRAPPER ── */
#gw{display:none;flex-direction:column;min-height:100vh}
.gh{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#12122a;border-bottom:1px solid #1e1e3a;position:sticky;top:0;z-index:100}
#bb,#fsb{background:none;border:1px solid #444;color:#999;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
#bb:hover,#fsb:hover{border-color:#ffe600;color:#ffe600}
#fsh,#fsh2{background:none;border:1px solid #333;color:#666;padding:4px 9px;border-radius:6px;cursor:pointer;font-size:14px;position:absolute;top:16px;right:16px;font-family:'Courier New',monospace}
#fsh:hover,#fsh2:hover{border-color:#ffe600;color:#ffe600}
.gt{font-size:12px;font-weight:700;letter-spacing:2px;color:#ffe600;flex:1}
#ga{display:flex;flex-direction:column;align-items:center}
.wi{width:100%;border:none;display:block}

/* ── FULLSCREEN ── */
#arc:-webkit-full-screen,#arc:-moz-full-screen,#arc:fullscreen{width:100vw;min-height:100vh;overflow-y:auto}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .gg{grid-template-columns:1fr 1fr}
  .login-box{padding:24px 18px}
  #login h1{font-size:24px}
}
</style>
</head>
<body>
<div id="arc">

  <!-- LOGIN -->
  <div id="login">
    <button id="fsh">⛶</button>
    <h1>🕹 ARCADE</h1>
    <p class="tagline">YOUR GAMES. YOUR PASSWORD.</p>
    <div class="login-box" id="lbox">
      <h2>WELCOME</h2>
      <p>Choose an option to get started</p>
      <div class="choice-btns">
        <button class="choice-btn new-btn" id="btn-new">✦ NEW</button>
        <button class="choice-btn start-btn" id="btn-start">▶ START</button>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">
    <button id="fsh2">⛶</button>
    <h1>🕹 ARCADE</h1>
    <p class="sub">3 GAMES — CHOOSE YOUR POISON</p>
    <p class="welcome" id="welcome-msg">👾 Welcome!</p>
    <div class="gg">
      <div class="gc" data-g="snake" style="border-color:#4fc3f7">
        <span class="ic">🐍</span><div class="nm">SNAKE.IO</div><div class="ds">Slither &amp; survive</div>
      </div>
      <div class="gc" data-g="merge" style="border-color:#7df0c0">
        <span class="ic">🍕</span><div class="nm">MERGE</div><div class="ds">Drag &amp; cook foods</div>
      </div>
      <div class="gc" data-g="easter" style="border-color:#FF69B4">
        <span class="ic">🐣</span><div class="nm">EGG HUNT</div><div class="ds">Find all 20 eggs!</div>
      </div>
    </div>
    <button class="logout-btn" id="logout-btn">⏏ LOG OUT</button>
  </div>

  <!-- GAME -->
  <div id="gw">
    <div class="gh">
      <button id="bb">← BACK</button>
      <div class="gt" id="gtl">GAME</div>
      <button id="fsb">⛶</button>
    </div>
    <div id="ga"></div>
  </div>

</div>
<script>
(function(){
  /* ── Auth ── */
  var STORE_KEY='arcade_users';
  var users={};
  var currentUser=null;

  function loadUsers(){try{var r=localStorage.getItem(STORE_KEY);if(r)users=JSON.parse(r);}catch(e){users={};}}
  function saveUsers(){try{localStorage.setItem(STORE_KEY,JSON.stringify(users));}catch(e){}}
  loadUsers();

  var lbox=document.getElementById('lbox');

  function showChoice(){
    lbox.innerHTML='<h2>WELCOME</h2><p>Choose an option to get started</p><div class="choice-btns"><button class="choice-btn new-btn" id="btn-new">✦ NEW</button><button class="choice-btn start-btn" id="btn-start">▶ START</button></div>';
    document.getElementById('btn-new').addEventListener('click',showNewForm);
    document.getElementById('btn-start').addEventListener('click',showStartForm);
  }

  function showNewForm(){
    lbox.innerHTML='<h2>NEW ACCOUNT</h2><p>Pick a username and a password.<br>Any letters, numbers or symbols.</p><div class="pw-form"><input class="pw-input" id="new-name" placeholder="Choose a username" maxlength="20" autocomplete="off"/><input class="pw-input" id="new-pw" type="password" placeholder="Choose a password" maxlength="40" autocomplete="new-password"/><input class="pw-input" id="new-pw2" type="password" placeholder="Confirm password" maxlength="40" autocomplete="new-password"/><div class="err-msg" id="new-err"></div><button class="submit-btn" id="new-submit">CREATE ACCOUNT</button><span class="back-link" id="new-back">← back</span></div>';
    document.getElementById('new-submit').addEventListener('click',doCreate);
    document.getElementById('new-pw2').addEventListener('keydown',function(e){if(e.key==='Enter')doCreate();});
    document.getElementById('new-back').addEventListener('click',showChoice);
  }

  function doCreate(){
    var name=document.getElementById('new-name').value.trim();
    var pw=document.getElementById('new-pw').value;
    var pw2=document.getElementById('new-pw2').value;
    var err=document.getElementById('new-err');
    if(!name){err.textContent='Username cannot be empty.';return;}
    if(name.length<2){err.textContent='Username must be at least 2 characters.';return;}
    if(!pw){err.textContent='Password cannot be empty.';return;}
    if(pw!==pw2){err.textContent='Passwords do not match.';return;}
    if(users[name.toLowerCase()]){err.textContent='Username already taken. Try another.';return;}
    users[name.toLowerCase()]={display:name,password:pw};
    saveUsers();
    lbox.innerHTML='<h2 style="color:#44ff88">✓ ACCOUNT CREATED</h2><p class="ok-msg">Welcome, '+name+'!<br>Logging you in...</p>';
    setTimeout(function(){enterArcade(name);},1200);
  }

  function showStartForm(){
    lbox.innerHTML='<h2>RETURNING PLAYER</h2><p>Enter your username and password.</p><div class="pw-form"><input class="pw-input" id="start-name" placeholder="Your username" maxlength="20" autocomplete="off"/><input class="pw-input" id="start-pw" type="password" placeholder="Your password" maxlength="40" autocomplete="current-password"/><div class="err-msg" id="start-err"></div><button class="submit-btn" id="start-submit">ENTER ARCADE</button><span class="back-link" id="start-back">← back</span></div>';
    document.getElementById('start-submit').addEventListener('click',doLogin);
    document.getElementById('start-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
    document.getElementById('start-back').addEventListener('click',showChoice);
  }

  function doLogin(){
    var name=document.getElementById('start-name').value.trim();
    var pw=document.getElementById('start-pw').value;
    var err=document.getElementById('start-err');
    if(!name){err.textContent='Please enter your username.';return;}
    if(!pw){err.textContent='Please enter your password.';return;}
    var rec=users[name.toLowerCase()];
    if(!rec){err.textContent='Username not found.';return;}
    if(rec.password!==pw){err.textContent='Incorrect password.';return;}
    lbox.innerHTML='<h2 style="color:#4fc3f7">▶ LOADING...</h2><p style="color:#4fc3f7;font-size:11px;letter-spacing:1px;">Welcome back, '+rec.display+'!</p>';
    setTimeout(function(){enterArcade(rec.display);},900);
  }

  function enterArcade(name){
    currentUser=name;
    document.getElementById('login').style.display='none';
    document.getElementById('home').style.display='flex';
    document.getElementById('welcome-msg').textContent='👾 Welcome, '+name+'!';
  }

  document.getElementById('logout-btn').addEventListener('click',function(){
    currentUser=null;
    if(cu){cu();cu=null;}
    document.getElementById('gw').style.display='none';
    document.getElementById('home').style.display='none';
    document.getElementById('login').style.display='flex';
    showChoice();
  });

  /* ── Fullscreen ── */
  function toggleFS(){
    var el=document.getElementById('arc');
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen).call(el);}
    else{(document.exitFullscreen||document.webkitExitFullscreen).call(document);}
  }
  function ufi(){
    var f=!!(document.fullscreenElement||document.webkitFullscreenElement);
    ['fsb','fsh','fsh2'].forEach(function(id){var b=document.getElementById(id);if(b)b.textContent=f?'✕':'⛶';});
  }
  ['fullscreenchange','webkitfullscreenchange'].forEach(function(e){document.addEventListener(e,ufi);});
  ['fsh','fsh2','fsb'].forEach(function(id){var b=document.getElementById(id);if(b)b.addEventListener('click',toggleFS);});

  showChoice();

  /* ── Game nav ── */
  var cu=null;
  function ga(){return document.getElementById('ga');}

  function goHome(){
    if(cu){cu();cu=null;}
    document.getElementById('gw').style.display='none';
    document.getElementById('home').style.display='flex';
  }

  function launch(name){
    if(cu){cu();cu=null;}
    document.getElementById('home').style.display='none';
    document.getElementById('gw').style.display='flex';
    ga().innerHTML='';
    var T={snake:'SNAKE.IO',merge:'MERGE',easter:'EGG HUNT'};
    document.getElementById('gtl').textContent=T[name]||name.toUpperCase();
    if(name==='snake')cu=iSnakeIO();
    else if(name==='merge')cu=iMerge();
    else cu=iEaster();
  }

  document.querySelectorAll('.gc').forEach(function(c){
    c.addEventListener('click',function(){launch(c.getAttribute('data-g'));});
  });
  document.getElementById('bb').addEventListener('click',goHome);

  /* ===== SNAKE.IO ===== */
  function iSnakeIO(){
    var f=document.createElement('iframe');
    f.className='wi';f.style.minHeight='580px';f.scrolling='no';
    ga().style.padding='0';
    f.srcdoc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0d1117;display:flex;flex-direction:column;align-items:center;padding:10px;font-family:sans-serif;color:#fff}#hud{display:flex;gap:16px;font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:8px;align-items:center}#hud b{color:#fff;font-weight:500}#cvw{position:relative;display:inline-block}#cv{display:block;border-radius:10px;border:1px solid rgba(255,255,255,0.1);cursor:none}#lb{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border-radius:8px;padding:8px 12px;font-size:12px;min-width:120px}#lb h3{margin:0 0 6px;font-size:12px;font-weight:600;color:#fff}.lbr{display:flex;justify-content:space-between;gap:10px;padding:2px 0;font-size:11px}#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:10px;background:rgba(0,0,0,0.75)}.ot{font-size:22px;font-weight:600;color:#fff}.os{font-size:13px;color:rgba(255,255,255,0.6)}#pb{padding:8px 28px;border:1px solid rgba(255,255,255,0.35);border-radius:8px;background:rgba(255,255,255,0.12);color:#fff;font-size:14px;cursor:pointer}#pb:hover{background:rgba(255,255,255,0.22)}#ni{padding:5px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(255,255,255,0.08);color:#fff;font-size:13px;text-align:center;outline:none;width:130px}p.tip{font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px}</style></head><body><div id="hud">Score: <b id="sc">0</b> &nbsp;|&nbsp; Length: <b id="ln">3</b> &nbsp;|&nbsp; <span id="rk"></span></div><div id="cvw"><canvas id="cv" width="560" height="480"></canvas><div id="lb"><h3>Leaderboard</h3><div id="lbl"></div></div><div id="ov"><p class="ot">🐍 Snake.io</p><p class="os">Move mouse to steer · Click to boost</p><input id="ni" value="Player" maxlength="12" placeholder="Your name"/><button id="pb">Play</button></div></div><p class="tip">Move mouse to steer · Click / hold to boost</p><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;const WORLD=2000,BALL_R=6,SEG=14,SPEED=2.2,BOOST=4.5;let player,bots,orbs,running=false,raf,mouse={x:W/2,y:H/2},boosting=false,cam={x:0,y:0},tick=0,playerName='Player';const COLORS=['#4fc3f7','#ef5350','#66bb6a','#ffa726','#ab47bc','#26c6da','#d4e157','#ff7043','#ec407a','#29b6f6'];const BOT_NAMES=['Noodle','Zigzag','Slinky','Viper','Wiggles','Coil','Dart','Flash','Rex','Mamba'];function rnd(a,b){return a+Math.random()*(b-a);}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}function makeSnake(x,y,color,name){const segs=[];for(let i=0;i<5;i++)segs.push({x:x-i*SEG,y});return{segs,color,name,angle:0,speed:SPEED,score:0,dead:false,targetAngle:Math.random()*Math.PI*2,wanderTimer:0};}function spawnOrbs(n){for(let i=0;i<n;i++)orbs.push({x:rnd(50,WORLD-50),y:rnd(50,WORLD-50),r:BALL_R,hue:Math.floor(rnd(0,360)),pulse:rnd(0,Math.PI*2),val:1});}function init(){playerName=document.getElementById('ni').value.trim()||'Player';const px=WORLD/2,py=WORLD/2;player=makeSnake(px,py,COLORS[0],playerName);player.angle=0;bots=[];for(let i=0;i<8;i++){const angle=Math.random()*Math.PI*2,d=300+Math.random()*600;bots.push(makeSnake(px+Math.cos(angle)*d,py+Math.sin(angle)*d,COLORS[i+1],BOT_NAMES[i]));for(let k=0;k<Math.floor(rnd(5,25));k++)bots[i].segs.push({...bots[i].segs[bots[i].segs.length-1]});bots[i].score=bots[i].segs.length-5;}orbs=[];spawnOrbs(300);tick=0;}function worldToScreen(wx,wy){return{x:wx-cam.x+W/2,y:wy-cam.y+H/2};}function inView(wx,wy,pad=50){const s=worldToScreen(wx,wy);return s.x>-pad&&s.x<W+pad&&s.y>-pad&&s.y<H+pad;}function updateBot(b){if(b.dead)return;b.wanderTimer--;const head=b.segs[0];let tx=head.x+Math.cos(b.targetAngle)*200,ty=head.y+Math.sin(b.targetAngle)*200;let nearestOrb=null,nearDist=250;for(const o of orbs){const d=dist(head,o);if(d<nearDist){nearDist=d;nearestOrb=o;}}if(nearestOrb){tx=nearestOrb.x;ty=nearestOrb.y;}if(!player.dead){const dp=dist(head,player.segs[0]);if(dp<120&&b.segs.length>player.segs.length){tx=player.segs[0].x;ty=player.segs[0].y;}}let da=Math.atan2(ty-head.y,tx-head.x)-b.angle;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;b.angle+=Math.max(-0.08,Math.min(0.08,da));if(b.wanderTimer<=0){b.targetAngle=Math.random()*Math.PI*2;b.wanderTimer=60+Math.random()*80;}const nx=head.x+Math.cos(b.angle)*b.speed,ny=head.y+Math.sin(b.angle)*b.speed;if(nx<20||nx>WORLD-20||ny<20||ny>WORLD-20){b.angle+=Math.PI*0.4;return;}b.segs.unshift({x:nx,y:ny});b.segs.pop();for(let i=orbs.length-1;i>=0;i--){if(dist(b.segs[0],orbs[i])<SEG/2+orbs[i].r){b.score+=orbs[i].val;const len=Math.floor(b.score/5);while(b.segs.length<5+len)b.segs.push({...b.segs[b.segs.length-1]});orbs.splice(i,1);spawnOrbs(1);}}}function updatePlayer(){if(player.dead)return;const head=player.segs[0];const tx=cam.x+mouse.x-W/2,ty=cam.y+mouse.y-H/2;let da=Math.atan2(ty-head.y,tx-head.x)-player.angle;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;player.angle+=Math.max(-0.12,Math.min(0.12,da));const spd=boosting&&player.segs.length>8?BOOST:SPEED;player.speed=spd;const nx=head.x+Math.cos(player.angle)*spd,ny=head.y+Math.sin(player.angle)*spd;if(nx<5||nx>WORLD-5||ny<5||ny>WORLD-5){killPlayer();return;}player.segs.unshift({x:nx,y:ny});if(boosting&&player.segs.length>8){const tail=player.segs.pop();orbs.push({x:tail.x,y:tail.y,r:4,hue:120,pulse:0,val:0.5});player.segs.pop();}else player.segs.pop();for(let i=orbs.length-1;i>=0;i--){if(dist(player.segs[0],orbs[i])<SEG/2+orbs[i].r){player.score+=orbs[i].val;const len=Math.floor(player.score/5);while(player.segs.length<5+len)player.segs.push({...player.segs[player.segs.length-1]});orbs.splice(i,1);spawnOrbs(1);}}}function checkCollisions(){if(player.dead)return;const ph=player.segs[0];for(const b of bots){if(b.dead)continue;for(let i=2;i<b.segs.length;i++){if(dist(ph,b.segs[i])<SEG*0.85){killPlayer();return;}}const bh=b.segs[0];for(let i=2;i<player.segs.
